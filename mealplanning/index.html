<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matplanering</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bgcolor">
    <h1>Välkommen till matloggen!</h1>

    <div class="planning">
        <select id="mealType">
            <option value="Frukost">Frukost</option>
            <option value="Lunch">Lunch</option>
            <option value="Middag">Middag</option>
            <option value="Mellis">Mellis</option>
        </select>
        

        <div class="foodList">
            <input id="foodInput" placeholder="Skriv livsmedelet:">
            <input id="amountInput" placeholder="Gram(t.ex 100)">
            <button id="add">Lägg till</button>
            <ul id="searchResult"></ul>
        </div>
        <div class="showFoodCart">
            <div id="result"></div>
            <div id="foodcart" class="foodcart"></div>
            <button id="saveMeal">Spara måltid</button>
        </div>

        <div class="showSavedMeals"></div>
    </div>
    <script src="script/meal.js"></script>
</body>

</html>
